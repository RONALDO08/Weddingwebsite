<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Huân & Mai</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎬 CINEMATIC INTRO -->
<div id="intro">
  <div class="intro-bg"></div>
  <div class="intro-text">
    <h1 class="font-wedding">Vũ Huân & Hoàng Mai</h1>
    <p>Save Our Date</p>
  </div>
</div>

<!-- 💌 ENVELOPE -->
<div id="envelope">
  <div class="env-body"></div>
  <div class="env-flap"></div>
  <div class="env-content">
    <h2>💌 Thiệp cưới</h2>
    <button onclick="openEnvelope()">Mở thiệp</button>
  </div>
</div>

<!-- 🎵 MUSIC -->
<audio id="audio" loop>
  <source src="music/wedding.mp3">
</audio>

<!-- HERO -->
<section class="hero">
  <img src="images/hero.jpg">
  <div class="overlay">
    <h1>Huân & Mai</h1>
    <p>06 . 06 . 2026</p>
  </div>
</section>

<!-- 📸 GALLERY -->
<section class="section">
  <div class="slider">
    <img src="images/gallery1.jpg" onclick="openLightbox(this)">
    <img src="images/gallery2.jpg" onclick="openLightbox(this)">
    <img src="images/gallery3.jpg" onclick="openLightbox(this)">
  </div>
</section>

<!-- FULLSCREEN -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script src="script.js"></script>
</body>
</html>
