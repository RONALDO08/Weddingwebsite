<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding: Vũ Huân & Hoàng Mai</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { --primary: #c29958; --text: #4a4a4a; }
        body { font-family: 'Montserrat', sans-serif; color: var(--text); background: #fff; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-wedding { font-family: 'Dancing Script', cursive; }
        
        .parallax { background-attachment: fixed; background-position: center; background-size: cover; }
        @media (max-width: 768px) { .parallax { background-attachment: scroll; } }

        #envelope-overlay {
            position: fixed; inset: 0; background: #fff; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .envelope-open { transform: translateY(-100%); }

        /* Gallery Styles */
        .img-container { position: relative; overflow: hidden; border-radius: 4px; background: #f3f4f6; }
        .img-container img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.8s ease; 
        }
        .img-container:hover img { transform: scale(1.05); }
        
        .aspect-vertical { aspect-ratio: 9 / 16; }
        .aspect-horizontal { aspect-ratio: 16 / 9; }

        .btn-map {
            display: inline-block; margin-top: 1rem; border: 1px solid #000;
            padding: 0.5rem 1.5rem; font-size: 10px; letter-spacing: 1px;
            text-transform: uppercase; border-radius: 99px; transition: 0.3s;
        }
        .btn-map:hover { background: #000; color: #fff; }

        .rotate { animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <audio id="wedding-audio" loop><source src="music/wedding-song.mp3" type="audio/mpeg"></audio>

    <!-- Overlay Mở Thiệp -->
    <div id="envelope-overlay">
        <div class="text-center px-4" data-aos="zoom-in">
            <div class="mb-6 w-32 h-32 mx-auto rounded-full border-2 border-[#c29958] p-1 shadow-xl overflow-hidden">
                <img src="images/mothiep.jpg" onerror="this.src='https://images.unsplash.com/photo-1519741497674-611481863552?w=300'" class="w-full h-full rounded-full object-cover">
            </div>
            <h2 class="font-wedding text-4xl mb-4 text-[#c29958]">Vũ Huân & Hoàng Mai</h2>
            <p class="mb-8 text-[10px] tracking-widest text-gray-400 uppercase">Trân trọng kính mời</p>
            <button onclick="openEnvelope()" class="bg-[#c29958] text-white px-10 py-4 rounded-full text-xs tracking-widest uppercase font-bold shadow-lg">Mở Thiệp 🎉</button>
        </div>
    </div>

    <!-- Hero -->
    <section class="h-screen parallax flex items-center justify-center relative" style="background-image: url('images/hero.jpg');">
        <div class="absolute inset-0 bg-black/20"></div>
        <div class="relative text-center text-white" data-aos="fade-up">
            <h1 class="font-wedding text-7xl md:text-9xl mb-4">Huân & Mai</h1>
            <p class="tracking-[0.5em] text-sm uppercase">04 . 06 . 2026</p>
        </div>
    </section>

    <!-- Gallery Section -->
    <section class="py-24 px-4 bg-white">
        <div class="max-w-6xl mx-auto">
            <div class="text-center mb-16" data-aos="fade-up">
                <h2 class="font-serif text-4xl italic mb-2">Wedding Gallery</h2>
                <div class="w-12 h-[1px] bg-[#c29958] mx-auto"></div>
            </div>

            <div class="space-y-6">
                <!-- Row 1: 2 Dọc -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="img-container aspect-vertical" data-aos="fade-right">
                        <img src="images/gallery1.jpg" onerror="this.src='https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=600'">
                    </div>
                    <div class="img-container aspect-vertical" data-aos="fade-left">
                        <img src="images/gallery2.jpg" onerror="this.src='https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=600'">
                    </div>
                </div>

                <!-- Row 2: 1 Ngang -->
                <div class="img-container aspect-horizontal" data-aos="zoom-in">
                    <img src="images/gallery3.jpg" onerror="this.src='https://images.unsplash.com/photo-1583939003579-730e3918a45a?w=1200'">
                </div>

                <!-- Row 3: 2 Dọc -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="img-container aspect-vertical" data-aos="fade-right">
                        <img src="images/gallery4.jpg" onerror="this.src='https://images.unsplash.com/photo-1522673607200-1648832cee98?w=600'">
                    </div>
                    <div class="img-container aspect-vertical" data-aos="fade-left">
                        <img src="images/gallery5.jpg" onerror="this.src='https://images.unsplash.com/photo-1549333106-69a033d20fc4?w=600'">
                    </div>
                </div>

                <!-- Row 4: 1 Ngang -->
                <div class="img-container aspect-horizontal" data-aos="zoom-in">
                    <img src="images/gallery6.jpg" onerror="this.src='https://images.unsplash.com/photo-1465495910483-e28923063d08?w=1200'">
                </div>

                <!-- Row 5: 3 Dọc (Hình 7, 8, 9) -->
                <div class="grid grid-cols-3 gap-2 md:gap-4">
                    <div class="img-container aspect-vertical" data-aos="fade-up" data-aos-delay="0">
                        <img src="images/gallery7.jpg" onerror="this.src='https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=400'">
                    </div>
                    <div class="img-container aspect-vertical" data-aos="fade-up" data-aos-delay="100">
                        <img src="images/gallery8.jpg" onerror="this.src='https://images.unsplash.com/photo-1520854221256-17451cc331bf?w=400'">
                    </div>
                    <div class="img-container aspect-vertical" data-aos="fade-up" data-aos-delay="200">
                        <img src="images/gallery9.jpg" onerror="this.src='https://images.unsplash.com/photo-1529636760656-e09213707fcf?w=400'">
                    </div>
                </div>

                <!-- Row 6: 3 Dọc (Hình 10, 11, 12) - PHẦN KIỂM TRA LỖI -->
                <div class="grid grid-cols-3 gap-2 md:gap-4">
                    <div class="img-container aspect-vertical" data-aos="fade-up" data-aos-delay="0">
                        <img src="images/gallery10.jpg" onerror="this.src='https://images.unsplash.com/photo-1510076857177-7470076d4098?w=400'">
                    </div>
                    <div class="img-container aspect-vertical" data-aos="fade-up" data-aos-delay="100">
                        <img src="images/gallery11.jpg" onerror="this.src='https://images.unsplash.com/photo-1544078751-58fee2d8a03b?w=400'">
                    </div>
                    <div class="img-container aspect-vertical" data-aos="fade-up" data-aos-delay="200">
                        <img src="images/gallery12.jpg" onerror="this.src='https://images.unsplash.com/photo-1507504031003-b417219a0fde?w=400'">
                    </div>
                </div>

                <!-- Row 7: 3 Dọc (Hình 13, 14, 15) -->
                <div class="grid grid-cols-3 gap-2 md:gap-4">
                    <div class="img-container aspect-vertical" data-aos="fade-up" data-aos-delay="0">
                        <img src="images/gallery13.jpg" onerror="this.src='https://images.unsplash.com/photo-1517722014278-c256a911678e?w=400'">
                    </div>
                    <div class="img-container aspect-vertical" data-aos="fade-up" data-aos-delay="100">
                        <img src="images/gallery14.jpg" onerror="this.src='https://images.unsplash.com/photo-1523438885200-e635ba2c371e?w=400'">
                    </div>
                    <div class="img-container aspect-vertical" data-aos="fade-up" data-aos-delay="200">
                        <img src="images/gallery15.jpg" onerror="this.src='https://images.unsplash.com/photo-1532712938310-34cb3982ef74?w=400'">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- RSVP Section -->
    <section class="py-24 px-6 bg-[#faf9f6]">
        <div class="max-w-lg mx-auto bg-white p-10 shadow-sm border border-gray-100" data-aos="fade-up">
            <h3 class="font-serif text-3xl text-center mb-8 italic">Xác nhận tham dự</h3>
            <div class="space-y-4">
                <input type="text" placeholder="Tên của bạn" class="w-full p-3 border-b outline-none text-sm">
                <input type="text" placeholder="Số người tham dự" class="w-full p-3 border-b outline-none text-sm">
                <button class="w-full bg-[#c29958] text-white py-4 text-xs tracking-widest font-bold hover:bg-black transition-all">GỬI PHẢN HỒI</button>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center text-gray-400">
        <p class="font-wedding text-3xl text-[#c29958] mb-2">Thank You</p>
        <p class="text-[10px] tracking-widest uppercase">Vũ Huân & Hoàng Mai • 2026</p>
    </footer>

    <script>
        AOS.init({ duration: 1000, once: true });

        function openEnvelope() {
            document.getElementById('envelope-overlay').classList.add('envelope-open');
            const audio = document.getElementById('wedding-audio');
            audio.play().catch(() => console.log("Cần tương tác để phát nhạc"));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
